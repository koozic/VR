spring:
  datasource:
    url: jdbc:h2:mem:ai_exhibition;MODE=Oracle;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=true
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

app:
  ai-server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8010}
