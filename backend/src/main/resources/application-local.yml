spring:
  datasource:
    url: jdbc:h2:mem:ai_exhibition;MODE=Oracle;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=true
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

app:
  admin:
    password: ${ADMIN_PASSWORD:admin1234}
  ai-server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8010}
  upload:
    storage-dir: ${UPLOAD_STORAGE_DIR:uploads}
  allowed-origins:
    patterns:
      - http://localhost:*
      - https://localhost:*
      - http://127.0.0.1:*
      - https://127.0.0.1:*
      - http://10.*:*
      - https://10.*:*
      - http://172.16.*:*
      - https://172.16.*:*
      - http://172.17.*:*
      - https://172.17.*:*
      - http://172.18.*:*
      - https://172.18.*:*
      - http://172.19.*:*
      - https://172.19.*:*
      - http://172.20.*:*
      - https://172.20.*:*
      - http://172.21.*:*
      - https://172.21.*:*
      - http://172.22.*:*
      - https://172.22.*:*
      - http://172.23.*:*
      - https://172.23.*:*
      - http://172.24.*:*
      - https://172.24.*:*
      - http://172.25.*:*
      - https://172.25.*:*
      - http://172.26.*:*
      - https://172.26.*:*
      - http://172.27.*:*
      - https://172.27.*:*
      - http://172.28.*:*
      - https://172.28.*:*
      - http://172.29.*:*
      - https://172.29.*:*
      - http://172.30.*:*
      - https://172.30.*:*
      - http://172.31.*:*
      - https://172.31.*:*
      - http://192.168.*:*
      - https://192.168.*:*
