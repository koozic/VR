server:
  port: 8080

spring:
  application:
    name: ai-exhibition
  datasource:
    url: jdbc:h2:mem:aiexhibition;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

app:
  ai-server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8000}
    timeout-seconds: ${AI_SERVER_TIMEOUT_SECONDS:10}

