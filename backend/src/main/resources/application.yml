server:
  port: 8080

spring:
  application:
    name: ai-exhibition
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@10.1.82.127:1521:XE}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:C##JS1004}
    password: ${DB_PASSWORD:js1004}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

app:
  ai-server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8000}
    timeout-seconds: ${AI_SERVER_TIMEOUT_SECONDS:40}

springdoc:
  swagger-ui:
    path: /docs
