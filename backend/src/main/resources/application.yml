server:
  port: 8080

spring:
  application:
    name: ai-exhibition
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@10.1.82.127:1521:XE}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:C##JS1004}
    password: ${DB_PASSWORD:js1004}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

app:
  ai-server:
    base-url: ${AI_SERVER_BASE_URL:http://localhost:8010}
    timeout-seconds: ${AI_SERVER_TIMEOUT_SECONDS:40}
  allowed-origins:
    patterns:
      - http://localhost:*
      - https://localhost:*
      - http://127.0.0.1:*
      - https://127.0.0.1:*
      - http://10.*:*
      - https://10.*:*
      - http://172.16.*:*
      - https://172.16.*:*
      - http://172.17.*:*
      - https://172.17.*:*
      - http://172.18.*:*
      - https://172.18.*:*
      - http://172.19.*:*
      - https://172.19.*:*
      - http://172.20.*:*
      - https://172.20.*:*
      - http://172.21.*:*
      - https://172.21.*:*
      - http://172.22.*:*
      - https://172.22.*:*
      - http://172.23.*:*
      - https://172.23.*:*
      - http://172.24.*:*
      - https://172.24.*:*
      - http://172.25.*:*
      - https://172.25.*:*
      - http://172.26.*:*
      - https://172.26.*:*
