server:
  port: 8080

spring:
  application:
    name: ai-exhibition
  datasource:
    url: ${DB_URL}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:25MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:25MB}

app:
  admin:
    password: ${ADMIN_PASSWORD}
  ai-server:
    base-url: ${AI_SERVER_BASE_URL:http://ai-server:8010}
    timeout-seconds: ${AI_SERVER_TIMEOUT_SECONDS:40}
  upload:
    storage-dir: ${UPLOAD_STORAGE_DIR:/app/uploads}
  allowed-origins:
    patterns: ${ALLOWED_ORIGIN_PATTERNS:http://vr-curatortest002.duckdns.org,http://vr-curatortest002.duckdns.org:*,http://54.116.209.157,http://54.116.209.157:*}

springdoc:
  swagger-ui:
    path: /docs
