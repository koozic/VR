server:
  port: 8080

spring:
  application:
    name: ai-exhibition
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@10.1.82.127:1521:XE}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:C##DH1004}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

app:
  ai-server:
    base-url: http://localhost:8000

